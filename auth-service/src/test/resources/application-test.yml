spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;INIT=CREATE SCHEMA IF NOT EXISTS auth
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        default_schema: auth
  flyway:
    enabled: false

jwt:
  secret: testSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLongForHS256AlgorithmTesting
  access-token-expiry: 900000
  refresh-token-expiry: 604800000

logging:
  level:
    com.eventplatform.auth: ERROR
