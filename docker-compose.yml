version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ems-postgres
    environment:
      POSTGRES_DB: eventplatform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - ems-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ./auth-service          # fix: was ./auth_service (directory uses hyphen)
      dockerfile: Dockerfile
    container_name: auth-service
    environment:
      SERVER_PORT: 8080
      DATABASE_URL: jdbc:postgresql://postgres:5432/eventplatform
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      JWT_SECRET: mySecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLongForHS256Algorithm
      JWT_ACCESS_EXPIRY: 900000
      JWT_REFRESH_EXPIRY: 604800000
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ems-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  event-service:
    build:
      context: ./event_management_service
      dockerfile: Dockerfile
    container_name: event-service
    environment:
      SERVER_PORT: 8080
      DATABASE_URL: jdbc:postgresql://postgres:5432/eventplatform
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      JWT_SECRET: mySecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLongForHS256Algorithm
      JWT_ACCESS_EXPIRY: 900000
      JWT_REFRESH_EXPIRY: 604800000
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ems-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health/liveness"]  # fix: actuator base-path:/ shadows /health/live; use actuator probe path
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  order-service:
    build:
      context: ./order_service
      dockerfile: Dockerfile
    container_name: order-service
    environment:
      SERVER_PORT: 8080
      DATABASE_URL: jdbc:postgresql://postgres:5432/eventplatform
      DB_USERNAME: postgres           # fix: was DATABASE_USERNAME (properties use DB_USERNAME)
      DB_PASSWORD: postgres           # fix: was DATABASE_PASSWORD (properties use DB_PASSWORD)
      JWT_SECRET: mySecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLongForHS256Algorithm
      JWT_ACCESS_EXPIRY_MS: 900000    # fix: was JWT_ACCESS_EXPIRY (properties use JWT_ACCESS_EXPIRY_MS)
      RAZORPAY_KEY_ID: your_razorpay_key_id_here        # fix: was STRIPE_SECRET_KEY
      RAZORPAY_KEY_SECRET: your_razorpay_key_secret_here # fix: was STRIPE_WEBHOOK_SECRET
      RAZORPAY_WEBHOOK_SECRET: your_razorpay_webhook_secret_here
      EVENT_SERVICE_BASE_URL: http://event-service:8080  # fix: was missing (default localhost won't work in Docker)
    ports:
      - "8082:8080"
    depends_on:
      postgres:
        condition: service_healthy
      event-service:
        condition: service_healthy
    networks:
      - ems-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  payment-service:
    build:
      context: ./payment_service
      dockerfile: Dockerfile
    container_name: payment-service
    environment:
      SERVER_PORT: 8080
      DATABASE_URL: jdbc:postgresql://postgres:5432/eventplatform
      DB_USERNAME: postgres           # fix: was DATABASE_USERNAME (properties use DB_USERNAME)
      DB_PASSWORD: postgres           # fix: was DATABASE_PASSWORD (properties use DB_PASSWORD)
      JWT_SECRET: mySecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLongForHS256Algorithm
      JWT_ACCESS_EXPIRY_MS: 900000    # fix: was JWT_ACCESS_EXPIRY (properties use JWT_ACCESS_EXPIRY_MS)
      RAZORPAY_KEY_ID: your_razorpay_key_id_here          # fix: was STRIPE_SECRET_KEY
      RAZORPAY_KEY_SECRET: your_razorpay_key_secret_here  # fix: was STRIPE_API_KEY
      RAZORPAY_WEBHOOK_SECRET: your_razorpay_webhook_secret_here  # fix: was STRIPE_WEBHOOK_SECRET (also had typo 'herec')
      RAZORPAY_SUCCESS_URL: http://localhost:3000/payment/success  # fix: was STRIPE_SUCCESS-URL (invalid hyphen in key)
      RAZORPAY_CANCEL_URL: http://localhost:3000/payment/cancel    # fix: was STRIPE_CANCEL-URL (invalid hyphen in key)
    ports:
      - "8083:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ems-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  ems-network:
    driver: bridge

volumes:
  postgres-data:
