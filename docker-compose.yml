version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ems-postgres
    environment:
      POSTGRES_DB: eventplatform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - ems-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    environment:
      SERVER_PORT: 8080
      DATABASE_URL: jdbc:postgresql://postgres:5432/eventplatform
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      JWT_SECRET: mySecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLongForHS256Algorithm
      JWT_ACCESS_EXPIRY: 900000
      JWT_REFRESH_EXPIRY: 604800000
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ems-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  event-service:
    build:
      context: ./event_management_service
      dockerfile: Dockerfile
    container_name: event-service
    environment:
      SERVER_PORT: 8080
      DATABASE_URL: jdbc:postgresql://postgres:5432/eventplatform
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      JWT_SECRET: mySecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLongForHS256Algorithm
      JWT_ACCESS_EXPIRY: 900000
      JWT_REFRESH_EXPIRY: 604800000
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ems-network
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health/live" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  order-service:
    build:
      context: ./order_service
      dockerfile: Dockerfile
    container_name: order-service
    environment:
      # Placeholder keys always fail Razorpay auth. For local stack without a Razorpay account, mock checkout skips Razorpay.
      MOCK_PAYMENT_CHECKOUT: "true"
      RAZORPAY_KEY_ID: ""
      RAZORPAY_KEY_SECRET: ""
      RAZORPAY_WEBHOOK_SECRET: ""
      SERVER_PORT: 8080
      DATABASE_URL: jdbc:postgresql://postgres:5432/eventplatform
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      JWT_SECRET: mySecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLongForHS256Algorithm
      JWT_ACCESS_EXPIRY: 900000
      JWT_REFRESH_EXPIRY: 604800000
      EVENT_SERVICE_BASE_URL: http://event-service:8080
      APP_FRONTEND_BASE_URL: http://localhost:5173
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "8082:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ems-network
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health/live" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  payment-service:
    build:
      context: ./payment_service
      dockerfile: Dockerfile
    container_name: payment-service
    environment:
      RAZORPAY_KEY_ID: your_razorpay_key_id_here
      RAZORPAY_KEY_SECRET: your_razorpay_key_secret_here
      RAZORPAY_WEBHOOK_SECRET: your_razorpay_webhook_secret_here
      RAZORPAY_SUCCESS_URL: http://localhost:3000/orders/success
      RAZORPAY_CANCEL_URL: http://localhost:3000/orders/cancel
      SERVER_PORT: 8080
      DATABASE_URL: jdbc:postgresql://postgres:5432/eventplatform
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      JWT_SECRET: mySecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLongForHS256Algorithm
      JWT_ACCESS_EXPIRY: 900000
      JWT_REFRESH_EXPIRY: 604800000
    ports:
      - "8083:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ems-network
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health/liveness" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  ems-network:
    driver: bridge

volumes:
  postgres-data:
