spring.datasource.url=jdbc:h2:mem:ordertest;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;INIT=CREATE SCHEMA IF NOT EXISTS orders\\;CREATE SCHEMA IF NOT EXISTS events
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.default_schema=orders
spring.flyway.enabled=false

jwt.secret=test-secret-key-minimum-32-characters-long-for-hmac-sha256-order-service
event.service.base-url=http://localhost:9999
mock.payment.checkout=true
