# Server Configuration
server.port=${SERVER_PORT:8083}
spring.application.name=order-service

# Database Configuration
spring.datasource.url=${DATABASE_URL:}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration/payment
spring.flyway.schemas=payments

# Razorpay Configuration
razorpay.key.id=${RAZORPAY_KEY_ID}
razorpay.key.secret=${RAZORPAY_KEY_SECRET}
razorpay.webhook.secret=${RAZORPAY_WEBHOOK_SECRET}
razorpay.success-url=${RAZORPAY_SUCCESS_URL}
razorpay.cancel-url=${RAZORPAY_CANCEL_URL}

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.access.expiry.ms=${JWT_ACCESS_EXPIRY_MS:900000}

# Logging Configuration
logging.level.root=INFO
logging.level.com.ticketing.orderservice=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%X{traceId}] %-5level %logger{36} - %msg%n

# Actuator Configuration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# CORS Configuration
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
