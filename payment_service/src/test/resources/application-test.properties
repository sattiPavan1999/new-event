spring.datasource.url=jdbc:h2:mem:paytest;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;INIT=CREATE SCHEMA IF NOT EXISTS orders\\;CREATE SCHEMA IF NOT EXISTS payments\\;CREATE SCHEMA IF NOT EXISTS events
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.default_schema=payments
spring.flyway.enabled=false

razorpay.key.id=test-key-id
razorpay.key.secret=test-key-secret
razorpay.webhook.secret=test-webhook-secret
razorpay.success-url=http://localhost:3000/success
razorpay.cancel-url=http://localhost:3000/cancel
